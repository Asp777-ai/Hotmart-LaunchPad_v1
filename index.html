<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 font-sans p-4">
    <main class="max-w-xl mx-auto text-center space-y-6">
        <h1 class="text-4xl font-bold">¡Conviértete en un Experto Digital!</h1>
        <p class="text-lg text-gray-700">Aprende a lanzar y escalar tu curso online con nuestro método.</p>
        <section class="text-left">
            <h2 class="text-2xl font-semibold mb-2">Beneficios del curso</h2>
            <ul class="list-disc list-inside space-y-1">
                <li>Estrategias de marketing probadas</li>
                <li>Soporte personalizado</li>
                <li>Acceso a actualizaciones de por vida</li>
            </ul>
        </section>
        <a href="https://go.hotmart.com/XXXXXXXXX" class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 inline-block">Comprar ahora</a>
        <form action="https://tinyletter.com/yournewsletter" method="post" class="space-y-2">
            <label for="email" class="block text-left font-medium">Recibe más tips por email:</label>
            <input type="email" name="email" id="email" required class="w-full border border-gray-300 p-2 rounded">
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Suscribirme</button>
        </form>
    </main>
</body>
</html>
